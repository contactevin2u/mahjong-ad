# Render blueprint (must live at the repo root so Render auto-detects it).
# In Render: New + → Blueprint → pick this repo. Fill the sync:false secrets in
# the dashboard. Builds run from the repo root so npm workspaces resolve.
services:
  - type: web
    name: mahjong-server
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run prisma:generate --workspace apps/server && npm run build --workspace apps/server && npm run prisma:push --workspace apps/server
    startCommand: npm run start --workspace apps/server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # paste a Postgres connection string (your existing free Render DB, or a Neon DB)
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false # set to your Vercel URL (e.g. https://mahjong-ad.vercel.app)
      - key: SERVER_PUBLIC_URL
        sync: false # set to this service's own public URL (e.g. https://mahjong-server.onrender.com)
      - key: BILLPLZ_BASE_URL
        value: https://www.billplz-sandbox.com/api
      - key: BILLPLZ_API_KEY
        sync: false
      - key: BILLPLZ_XSIGNATURE_KEY
        sync: false
      - key: BILLPLZ_COLLECTION_ID
        sync: false

# NOTE: The database is intentionally NOT created by this blueprint (Render allows
# only one free database per account). Provide DATABASE_URL above by pasting the
# connection string of an existing Postgres database (your current free Render DB,
# or a free Neon database).
